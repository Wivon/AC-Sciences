<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" />
  <title>AC Sciences</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="app-header">
      <div id="header-left">
        <img src="./graphics/ac-logo.jpg" alt="Logo Albert Claveille" style="height: 30px; margin-right: 10px;">
        <span id="app-title">AC Sciences</span>
        <span id="project-name-display">— Sans Nom</span>
      </div>
      <div id="tab-bar">
        <button class="tab-btn active" data-tab="sheet">Tableur</button>
        <button class="tab-btn" data-tab="graph">Graph</button>
      </div>
      <div id="header-right">
        <button id="open-btn" class="header-btn" title="Ouvrir (Ctrl+O)">Ouvrir</button>
        <button id="save-btn" class="header-btn" title="Sauvegarder (Ctrl+S)">Sauvegarder</button>
      </div>
    </header>

    <!-- Formula Bar (Sheet only) -->
    <div id="formula-bar">
      <span id="formula-cell-ref">—</span>
      <span id="formula-eq">:</span>
      <input id="formula-input" type="text" placeholder="Selectionnez une cellule pour la modifier" disabled />
    </div>

    <!-- Tab: Sheet -->
    <div id="tab-sheet" class="tab-content active">
      <div id="sheet-toolbar">
        <button id="add-col-btn" class="toolbar-btn green">+ Colonne</button>
        <button id="add-row-btn" class="toolbar-btn blue">+ Ligne</button>
      </div>
      <div id="sheet-scroll-container">
        <table id="sheet-table">
          <thead>
            <tr id="sheet-header-row">
              <th class="row-num-header">#</th>
            </tr>
            <tr id="sheet-unit-row">
              <th class="row-num-header unit-label">Unit</th>
            </tr>
          </thead>
          <tbody id="sheet-body">
          </tbody>
        </table>
      </div>
    </div>

    <!-- Tab: Graph -->
    <div id="tab-graph" class="tab-content hidden">
      <div id="graph-layout">
        <aside id="graph-sidebar">
          <div class="sidebar-section">
            <h3>Axes</h3>
            <label>Axe X
              <select id="x-axis-select"><option value="">— select —</option></select>
            </label>
            <label class="y-axis-label">Axe Y</label>
            <div id="y-axis-list" class="y-axis-checklist"></div>
          </div>

          <div class="sidebar-section">
            <h3>Dériver</h3>
            <label>Colonne
              <select id="derive-col-select"><option value="">— select —</option></select>
            </label>
            <button id="derive-btn" class="sidebar-btn blue">Calculer d/dx → nouvelle colonne</button>
          </div>

          <div class="sidebar-section">
            <h3>Modéliser</h3>
            <label>Type de courbe
              <select id="regression-type-select">
                <option value="none">None</option>
                <option value="linear">Droite (y = mx + p)</option>
                <option value="exponential">Exponentielle (y = a·eᵇˣ)</option>
                <option value="parabola">Parabolique (y = ax² + bx + c)</option>
              </select>
            </label>
            <button id="fit-curve-btn" class="sidebar-btn amber">Tracer</button>
            <div id="regression-result"></div>
          </div>

          <div class="sidebar-section">
            <button id="refresh-graph-btn" class="sidebar-btn blue">Recharger le Graph</button>
          </div>
        </aside>

        <main id="graph-main">
          <div id="chart-container">
            <canvas id="chart-canvas"></canvas>
          </div>
          <div id="chart-placeholder" class="hidden">
            <p>Select X and Y columns to display the graph.</p>
          </div>
        </main>
      </div>
    </div>
  </div>

  <script src="../node_modules/chart.js/dist/chart.umd.js"></script>
  <script src="sheet.js"></script>
  <script src="graph.js"></script>
  <script src="app.js"></script>
</body>
</html>
